name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: stock-analyzer-mac
            binary: dist/stock-analyzer
          - os: windows-latest
            artifact: stock-analyzer-windows.exe
            binary: dist/stock-analyzer.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: pyinstaller stock-analyzer.spec

      - name: Rename binary (Mac)
        if: runner.os == 'macOS'
        run: mv dist/stock-analyzer dist/stock-analyzer-mac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Stock Analyzer ${{ github.ref_name }}"
          body: |
            ## Stock Analyzer ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | macOS | `stock-analyzer-mac` |
            | Windows | `stock-analyzer-windows.exe` |

            ### Usage
            **macOS** — open Terminal, run:
            ```bash
            chmod +x stock-analyzer-mac
            ./stock-analyzer-mac portfolio.csv
            ```

            **Windows** — open Command Prompt, run:
            ```
            stock-analyzer-windows.exe portfolio.csv
            ```

            ### Portfolio file format
            ```csv
            ticker,type,quantity
            VOO,ETF,200
            QQQ,ETF,200
            NVDA,STOCK,50
            FXAIX,MF,200
            ```
          files: |
            artifacts/stock-analyzer-mac/stock-analyzer-mac
            artifacts/stock-analyzer-windows.exe/stock-analyzer-windows.exe
          draft: false
          prerelease: false
